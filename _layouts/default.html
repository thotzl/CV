<!DOCTYPE html>
<html lang="{{ site.lang | default: 'de' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    · <a href="{{ '/scan/' | relative_url }}">Recruiter-Scan</a>
    · <a href="{{ '/cv/' | relative_url }}">CV</a>
    · <a href="{{ '/lebenslauf/' | relative_url }}">Lebenslauf</a>
  </nav>

  <p>
    <button type="button" onclick="window.print()">Print</button>
    <button type="button" data-share>Share</button>
  </p>

  <main>
    {{ content }}
  </main>

  <script>
    (function () {
      var shareButton = document.querySelector('[data-share]');
      if (!shareButton) return;

      shareButton.addEventListener('click', function () {
        var url = window.location.href;

        if (navigator.share) {
          navigator.share({ title: document.title, url: url }).catch(function () {});
          return;
        }

        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(url).then(function () {
            var prev = shareButton.textContent;
            shareButton.textContent = 'Link kopiert';
            window.setTimeout(function () { shareButton.textContent = prev; }, 1500);
          }).catch(function () {
            window.prompt('Link kopieren:', url);
          });
          return;
        }

        window.prompt('Link kopieren:', url);
      });
    })();
  </script>
</body>
</html>
