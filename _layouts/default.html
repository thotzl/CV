<!DOCTYPE html>
<html lang="{{ site.lang | default: 'de' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>
  <nav class="links scroll">
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/scan/' | relative_url }}">Recruiter-Scan</a>
    <a href="{{ '/cv/' | relative_url }}">CV</a>
    <a href="{{ '/lebenslauf/' | relative_url }}">Lebenslauf</a>
  </nav>

  <hr class="divider">

  <main>
    {{ content }}
  </main>

  <footer>
    <p class="copy">
      &copy; {{ site.title }} {{ site.time | date: '%Y' }}
      · Last updated {{ site.time | date_to_long_string }}
    </p>
  </footer>
</body>
</html>
